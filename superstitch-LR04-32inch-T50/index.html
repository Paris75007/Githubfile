<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Avatar View</title>
    <style>
        /* 全体のスタイル設定 */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 期限内：画面全体をAR起動ボタンにする */
        .ar-launcher {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%;
            text-decoration: none; -webkit-tap-highlight-color: transparent;
            text-align: center;
        }
        .ar-launcher .icon {
            width: 100px; height: 100px; margin-bottom: 24px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .ar-launcher .text { color: #007aff; font-size: 22px; font-weight: 600; }
        .ar-launcher .sub-text { color: #8e8e93; font-size: 14px; margin-top: 8px; }

        /* 期限切れ：多言語メッセージのデザイン */
        .message-container {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 20px; box-sizing: border-box; background-color: #f2f2f7;
        }
        .message-box {
            background: #ffffff; padding: 40px 30px; border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center;
        }
        .alert-title { font-weight: bold; color: #ff3b30; font-size: 1.1em; margin-bottom: 8px; }
        .alert-sub { font-size: 0.95em; color: #333; margin-bottom: 20px; line-height: 1.5; }
        .contact { font-size: 0.9em; color: #8e8e93; }
        .contact a { color: #007aff; text-decoration: none; font-weight: 500; }
        hr { border: 0; border-top: 1px solid #e5e5ea; margin: 30px 0; }
    </style>
</head>
<body>

    <div id="content"></div>

    <script>
        // 設定項目
        const deadline = new Date('2026-03-14T00:00:00+09:00');
        // カメラ（ARモード）を優先して起動させるためのパラメータを追加
        const usdzFile = "superstitch-LR04-32inch-T50.usdz#allowsRemoteThreshold=0";
        const contactEmail = "monsieurmushi@gmail.com";

        const now = new Date();
        const contentArea = document.getElementById('content');

        if (now < deadline) {
            // 【期限内】画面全体を巨大なARトリガーにする
            // rel="ar" と <img> を含めることでiOSのAR Quick Lookを即時発動させやすくします
            contentArea.innerHTML = `
                <a rel="ar" href="${usdzFile}" class="ar-launcher">
                    <img src="https://developer.apple.com/assets/elements/icons/augmented-reality/augmented-reality-64x64_2x.png" class="icon" alt="AR">
                    <div class="text">タップしてカメラを起動</div>
                    <div class="sub-text">Place the avatar in your room</div>
                </a>
            `;
        } else {
            // 【期限切れ】フランス語と英語のメッセージを表示
            contentArea.innerHTML = `
                <div class="message-container">
                    <div class="message-box">
                        <div>
                            <p class="alert-title">La période de consultation publique est terminée.</p>
                            <p class="alert-sub">Merci de votre visite.</p>
                            <p class="contact">Pour toute demande, veuillez contacter YOSHI à<br>
                               <a href="mailto:${contactEmail}">${contactEmail}</a></p>
                        </div>
                        <hr>
                        <div>
                            <p class="alert-title">The public viewing period has ended.</p>
                            <p class="alert-sub">Thank you for viewing.</p>
                            <p class="contact">For inquiries, please contact YOSHI at<br>
                               <a href="mailto:${contactEmail}">${contactEmail}</a></p>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
