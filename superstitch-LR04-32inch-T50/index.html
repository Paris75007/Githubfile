<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Avatar View</title>
</head>
<body style="margin:0; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; font-family:-apple-system, sans-serif; background-color: #fff; overflow: hidden;">

    <div id="content-area" style="width: 100%; height: 100%;">
        </div>

    <script>
        // 設定項目
        // 今日の日付が2026年3月13日なので、期限を3月14日に更新しています
        const deadline = new Date('2026-03-14T00:00:00+09:00');
        const usdzFile = "iphone-top-et-leggings-T36.usdz#allowsRemoteThreshold=0";
        const contactEmail = "monsieurmushi@gmail.com";

        const now = new Date();
        const contentArea = document.getElementById('content-area');

        if (now < deadline) {
            // 【期限内】画面全体を巨大な起動ボタンにして、タップ漏れを防ぐ
            contentArea.innerHTML = `
                <a id="ar-link" rel="ar" href="${usdzFile}" style="display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; height:100%; text-decoration:none; -webkit-tap-highlight-color:transparent;">
                    <img src="https://developer.apple.com/assets/elements/icons/augmented-reality/augmented-reality-64x64_2x.png" width="100" style="margin-bottom:20px;">
                    <p style="color:#007aff; font-size:20px; font-weight:bold;">タップしてARを開始</p>
                    <p style="color:#888; font-size:12px; margin-top:8px;">Tap to launch Camera</p>
                </a>
            `;

            // ページ読み込み完了後、可能な限り早くクリックイベントを試行
            // ※iOSの制限により「ユーザーの指が触れる」必要がありますが、
            //   この巨大ボタンならメールから飛んできた瞬間の「ついでタップ」で即起動します
            setTimeout(function() {
                document.getElementById('ar-link').click();
            }, 100);

        } else {
            // 【期限切れ】ご指定のフランス語と英語のメッセージ
            contentArea.innerHTML = `
                <div style="padding: 40px; line-height: 1.6; color: #333; text-align: center;">
                    <div style="margin-bottom: 30px;">
                        <p style="font-weight: bold; color:#ff3b30;">La période de consultation publique est terminée. Merci de votre visite.</p>
                        <p>Pour toute demande concernant le service, veuillez contacter YOSHI à <a href="mailto:${contactEmail}" style="color: #007aff; text-decoration:none;">${contactEmail}</a>.</p>
                    </div>
                    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
                    <div>
                        <p style="font-weight: bold; color:#ff3b30;">The public viewing period has ended. Thank you for viewing.</p>
                        <p>For inquiries regarding the service, please contact YOSHI at <a href="mailto:${contactEmail}" style="color: #007aff; text-decoration:none;">${contactEmail}</a>.</p>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
