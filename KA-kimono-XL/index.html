<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Avatar View</title>
</head>
<body style="margin:0; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; padding: 20px; text-align: center; box-sizing: border-box;">

    <div id="content-area">
        </div>

    <script>
        // 設定項目
        const deadline = new Date('2026-03-09T00:00:00+09:00'); // 期限：2026年3月9日 00:00
        const usdzFile = "KIMONO-XL.usdz";
        const contactEmail = "monsieurmushi@gmail.com";

        const now = new Date();
        const contentArea = document.getElementById('content-area');

        if (now < deadline) {
            // 【期限内】AR起動リンクを表示
            contentArea.innerHTML = `
                <a id="ar-link" rel="ar" href="${usdzFile}" style="text-decoration:none;">
                    <img src="https://developer.apple.com/assets/elements/icons/augmented-reality/augmented-reality-64x64_2x.png" width="80">
                    <p style="color:#007aff; font-weight:bold; margin-top:10px;">ARで表示する</p>
                </a>
            `;

            // 自動起動スクリプト
            setTimeout(function() {
                document.getElementById('ar-link').click();
            }, 500);

        } else {
            // 【期限切れ】フランス語と英語のメッセージを表示
            contentArea.innerHTML = `
                <div style="line-height: 1.6; color: #333;">
                    <div style="margin-bottom: 30px;">
                        <p style="font-weight: bold;">La période de consultation publique est terminée. Merci de votre visite.</p>
                        <p>Pour toute demande concernant le service, veuillez contacter YOSHI à <a href="mailto:${contactEmail}" style="color: #007aff;">${contactEmail}</a>.</p>
                    </div>
                    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                    <div>
                        <p style="font-weight: bold;">The public viewing period has ended. Thank you for viewing.</p>
                        <p>For inquiries regarding the service, please contact YOSHI at <a href="mailto:${contactEmail}" style="color: #007aff;">${contactEmail}</a>.</p>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
